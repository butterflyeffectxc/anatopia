name: my_body
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.4
  audioplayers: ^6.0.0
  just_audio: ^0.9.46
  path_provider: ^2.1.5

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  fonts:
    - family: Fredoka
      fonts:
      - asset: assets/font/Fredoka-Medium.ttf
        weight: 500
      - asset: assets/font/Fredoka-SemiBold.ttf
        weight: 600
      - asset: assets/font/Fredoka-Bold.ttf
        weight: 700
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audios/
    - assets/gif/

